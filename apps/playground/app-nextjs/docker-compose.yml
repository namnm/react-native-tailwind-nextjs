services:
  playground_nextjs:
    container_name: playground_nextjs
    image: oven/bun:1
    working_dir: /next-standalone/apps/playground/app-nextjs
    volumes:
      - ./.next/standalone:/next-standalone
    command: bun run server.js
    environment:
      - PORT=3333
      - HOSTNAME=0.0.0.0
    ports:
      - '3333:3333'

  playground_nginx:
    container_name: playground_nginx
    image: nginx:alpine
    ports:
      - '3334:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./.next/standalone:/next-standalone
      - ./.next/static:/next-static
      - ./public:/next-public
    depends_on:
      - playground_nextjs
