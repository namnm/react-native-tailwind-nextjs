services:
  playground_nextjs:
    container_name: playground_nextjs
    image: oven/bun:1
    volumes:
      - ./.next/standalone:/next-standalone
    working_dir: /next-standalone/apps/playground/app-nextjs
    command: bun run server.js
    environment:
      - PORT=80
    ports:
      - '3333:80'

  playground_nginx:
    container_name: playground_nginx
    image: nginx:alpine
    depends_on:
      - playground_nextjs
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./.next/static:/next-static
      - ./public:/next-public
    ports:
      - '3334:80'
